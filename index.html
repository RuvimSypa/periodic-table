<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Таблица Менделеева</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@400;700&display=swap"
          rel="stylesheet">
    <style>
        /* ── DARK THEME (default) ── */
        :root {
            --bg: #08090e;
            --surface: #0f1117;
            --border: #1e2235;
            --text: #c8d0e8;
            --dim: #4a5272;
            --accent: #00e5ff;
            --modal-bg: #0c0e18;
            --shadow: rgba(0, 0, 0, .78);
            --alkali: #ff5c6e;
            --alkaline: #ff9f43;
            --transition: #4e9dff;
            --post: #a29bfe;
            --metalloid: #55efc4;
            --nonmetal: #fdcb6e;
            --halogen: #fd79a8;
            --noble: #74b9ff;
            --lanthanide: #e17055;
            --actinide: #6c5ce7;
            --unknown: #888e9b;
        }

        /* ── LIGHT THEME ── */
        html.light {
            --bg: #eef0f7;
            --surface: #ffffff;
            --border: #c8cde0;
            --text: #1a1f36;
            --dim: #6b7494;
            --accent: #0055bb;
            --modal-bg: #ffffff;
            --shadow: rgba(0, 0, 0, .45);
            --alkali: #c9253a;
            --alkaline: #b86200;
            --transition: #1558c0;
            --post: #5b4dd4;
            --metalloid: #007a58;
            --nonmetal: #966a00;
            --halogen: #ad1457;
            --noble: #0d4fa0;
            --lanthanide: #a83820;
            --actinide: #3d1f96;
            --unknown: #4f5870;
        }

        /* light mode cell overrides */
        html.light .el {
            border-color: color-mix(in srgb, var(--cat-color) 35%, transparent) !important;
            background: color-mix(in srgb, var(--cat-color) 10%, #ffffff) !important;
            box-shadow: 0 1px 3px rgba(0, 0, 0, .08);
        }

        html.light .el:active,
        html.light .el:hover {
            border-color: var(--cat-color) !important;
            box-shadow: 0 0 12px color-mix(in srgb, var(--cat-color) 40%, transparent) !important;
        }

        html.light .el .num {
            color: #8892b0;
        }

        html.light .el .name {
            color: #5a6282;
        }

        html.light .el .mass {
            color: #8892b0;
        }

        html.light .spacer {
            box-shadow: none !important;
            border-color: transparent !important;
            background: transparent !important;
        }

        html.light .lbl {
            box-shadow: none !important;
            border-color: transparent !important;
            background: transparent !important;
        }

        html.light .modal {
            box-shadow: 0 8px 40px rgba(0, 0, 0, .18) !important;
        }

        html.light .mconf {
            background: rgba(0, 0, 0, .04) !important;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Exo 2', sans-serif;
        }

        h1 {
            text-align: center;
            font-family: 'Share Tech Mono', monospace;
            font-size: 18px;
            letter-spacing: 4px;
            color: var(--accent);
            text-shadow: 0 0 16px color-mix(in srgb, var(--accent) 35%, transparent);
            padding: 14px 0 2px;
        }

        /* theme toggle */
        .theme-btn {
            position: fixed;
            top: 12px;
            right: 14px;
            z-index: 500;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 5px 12px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 11px;
            color: var(--dim);
            cursor: pointer;
            transition: all .2s;
            letter-spacing: 1px;
        }

        .theme-btn:hover {
            color: var(--accent);
            border-color: var(--accent);
        }

        .sub {
            text-align: center;
            font-size: 9px;
            letter-spacing: 2px;
            color: var(--dim);
            text-transform: uppercase;
            margin-bottom: 6px;
        }

        .hint {
            text-align: center;
            font-size: 11px;
            color: var(--dim);
            margin-bottom: 10px;
        }

        .hint span {
            color: var(--accent);
        }

        /* Desktop: fit to screen. Mobile: fixed cells + horizontal scroll */
        .scroll-wrap {
            padding-bottom: 24px;
        }

        .scroll-inner {
            display: block;
            padding: 0 10px;
        }

        .grid {
            display: grid;
            grid-template-columns:repeat(18, minmax(44px, 58px));
            grid-auto-rows: minmax(44px, 58px);
            gap: 3px;
            justify-content: center;
            margin: 0 auto;
            max-width: 1100px;
        }

        @media (max-width: 1060px) {
            .scroll-wrap {
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
                -webkit-mask-image: linear-gradient(to right, transparent 0, black 24px, black calc(100% - 24px), transparent 100%);
                mask-image: linear-gradient(to right, transparent 0, black 24px, black calc(100% - 24px), transparent 100%);
            }

            .scroll-inner {
                display: inline-block;
                min-width: 100%;
                padding: 0 28px;
            }

            .grid {
                grid-template-columns:repeat(18, 54px);
                grid-auto-rows: 54px;
                width: max-content;
                max-width: none;
                margin: 0;
            }
        }

        .el {
            position: relative;
            border-radius: 4px;
            border: 1px solid transparent;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2px;
            background: color-mix(in srgb, var(--cat-color) 12%, var(--surface));
            -webkit-tap-highlight-color: transparent;
            transition: border-color .15s, box-shadow .15s;
        }

        .el:active {
            border-color: var(--cat-color);
            box-shadow: 0 0 12px var(--cat-color);
        }

        @media (hover: hover) {
            .el:hover {
                border-color: var(--cat-color);
                box-shadow: 0 0 16px var(--cat-color);
                transform: scale(1.12);
                z-index: 10;
            }
        }

        .el .num {
            font-size: 8px;
            color: var(--dim);
            font-family: 'Share Tech Mono', monospace;
        }

        .el .sym {
            font-size: 17px;
            font-weight: 700;
            line-height: 1.1;
            color: var(--cat-color);
            text-shadow: 0 0 8px color-mix(in srgb, var(--cat-color) 55%, transparent);
        }

        .el .name {
            font-size: 6px;
            text-align: center;
            color: var(--dim);
            line-height: 1.2;
        }

        .el .mass {
            font-size: 6px;
            color: var(--dim);
            font-family: 'Share Tech Mono', monospace;
        }

        .spacer {
            background: transparent !important;
            border: none !important;
            cursor: default;
            pointer-events: none;
        }

        .lbl {
            background: transparent !important;
            border: none !important;
            cursor: default;
            font-size: 8px;
            color: var(--dim);
            font-family: 'Share Tech Mono', monospace;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }

        .gap-row {
            height: 8px;
            grid-column: 1/-1;
        }

        .el.dimmed {
            opacity: .1;
        }

        /* scroll indicator arrow */
        .arrow {
            position: fixed;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 22px;
            color: var(--accent);
            opacity: .6;
            pointer-events: none;
            animation: bob 1.5s ease-in-out infinite;
            z-index: 50;
        }

        @keyframes bob {
            0%, 100% {
                transform: translateY(-50%) translateX(0)
            }
            50% {
                transform: translateY(-50%) translateX(5px)
            }
        }

        /* category filter pills */
        .pills-wrap {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 6px;
            padding: 0 12px 10px;
            scrollbar-width: none;
        }

        .pills-wrap::-webkit-scrollbar {
            display: none;
        }

        .pill {
            flex-shrink: 0;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 11px;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: all .15s;
            white-space: nowrap;
            background: var(--surface);
            color: var(--dim);
        }

        .pill.active {
            background: color-mix(in srgb, var(--pill-color) 20%, transparent);
            color: var(--pill-color);
            border-color: var(--pill-color);
        }

        /* modal — bottom sheet on mobile, centered on desktop */
        .overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: color-mix(in srgb, var(--shadow) 90%, transparent);
            backdrop-filter: blur(6px);
            z-index: 1000;
            align-items: flex-end;
            justify-content: center;
        }

        .overlay.open {
            display: flex;
        }

        .modal {
            background: var(--modal-bg);
            border: 1px solid var(--cat-color, var(--accent));
            border-radius: 16px 16px 0 0;
            padding: 18px 22px 36px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 0 36px 4px color-mix(in srgb, var(--cat-color, var(--accent)) 30%, transparent);
            animation: slideup .22s ease;
            position: relative;
            max-height: 88vh;
            overflow-y: auto;
        }

        @keyframes slideup {
            from {
                transform: translateY(60px);
                opacity: 0
            }
            to {
                transform: translateY(0);
                opacity: 1
            }
        }

        @keyframes pop {
            from {
                transform: scale(.88);
                opacity: 0
            }
            to {
                transform: scale(1);
                opacity: 1
            }
        }

        @media (min-width: 600px) {
            .overlay {
                align-items: center;
            }

            .modal {
                border-radius: 12px;
                animation: pop .2s ease;
            }

            .handle {
                display: none;
            }
        }

        .handle {
            width: 34px;
            height: 4px;
            border-radius: 2px;
            background: var(--border);
            margin: 0 auto 12px;
        }

        .mc {
            position: absolute;
            top: 12px;
            right: 14px;
            background: none;
            border: none;
            color: var(--dim);
            font-size: 22px;
            cursor: pointer;
            padding: 4px 8px;
        }

        .mt {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 12px;
        }

        .mnum {
            font-size: 12px;
            color: var(--dim);
            font-family: 'Share Tech Mono', monospace;
            letter-spacing: 2px;
        }

        .msym {
            font-size: 64px;
            font-weight: 700;
            line-height: 1;
            color: var(--cat-color, var(--accent));
            text-shadow: 0 0 24px color-mix(in srgb, var(--cat-color, var(--accent)) 55%, transparent);
        }

        .mname {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 6px;
            padding-top: 4px;
        }

        .mcat {
            display: inline-block;
            font-size: 11px;
            padding: 3px 10px;
            border-radius: 20px;
            letter-spacing: 1px;
            background: color-mix(in srgb, var(--cat-color, var(--accent)) 18%, transparent);
            color: var(--cat-color, var(--accent));
            border: 1px solid color-mix(in srgb, var(--cat-color, var(--accent)) 40%, transparent);
        }

        .div {
            height: 1px;
            background: var(--border);
            margin: 12px 0;
        }

        .mgrid {
            display: grid;
            grid-template-columns:1fr 1fr;
            gap: 10px 18px;
            font-size: 14px;
        }

        .mrow {
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .mlabel {
            color: var(--dim);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .mval {
            color: var(--text);
            font-weight: 600;
        }

        .mconf {
            font-family: 'Share Tech Mono', monospace;
            font-size: 12px;
            color: var(--dim);
            margin-top: 12px;
            word-break: break-all;
            background: color-mix(in srgb, var(--text) 4%, transparent);
            padding: 8px 10px;
            border-radius: 5px;
        }
    </style>
</head>

    const css = k => getComputedStyle(document.documentElement).getPropertyValue(CAT[k].v).trim();

    // pills
    const pillsEl = document.getElementById('pills');
    let activeF = null;
    const allPill = document.createElement('div');
    allPill.className = 'pill active';
    allPill.textContent = 'Все';
    allPill.style.setProperty('--pill-color', 'var(--accent)');
    allPill.addEventListener('click', () => {
        activeF = null;
        sync();
        dim();
    });
    pillsEl.appendChild(allPill);
    Object.entries(CAT).forEach(([k, { label }]) => {
        const c = css(k), p = document.createElement('div');
        p.className = 'pill';
        p.textContent = label;
        p.dataset.cat = k;
        p.style.setProperty('--pill-color', c);
        p.addEventListener('click', () => {
            activeF = activeF === k ? null : k;
            sync();
            dim();
        });
        pillsEl.appendChild(p);
    });

    function sync() {
        allPill.classList.toggle('active', !activeF);
        pillsEl.querySelectorAll('.pill[data-cat]').forEach(p => p.classList.toggle('active', p.dataset.cat === activeF));
    }

    function dim() {
        document.querySelectorAll('.el[data-z]').forEach(el => el.classList.toggle('dimmed', !!activeF && el.dataset.cat !== activeF));
    }

    // grid
    const byPG = {};
    E.forEach(e => {
        if (!byPG[e[5]]) byPG[e[5]] = {};
        byPG[e[5]][e[6]] = e;
    });
    const lant = E.filter(e => e[4] === 'lanthanide' && e[2] !== 'Лантан');
    const acti = E.filter(e => e[4] === 'actinide' && e[2] !== 'Актиний');
    const grid = document.getElementById('grid');

    function cell(e) {
        const c = css(e[4]), d = document.createElement('div');
        d.className = 'el';
        d.dataset.z = e[0];
        d.dataset.cat = e[4];
        d.style.setProperty('--cat-color', c);
        d.innerHTML = `<span class="num">${e[0]}</span><span class="sym">${e[1]}</span><span class="name">${e[2]}</span><span class="mass">${e[3]}</span>`;
        d.addEventListener('click', () => open(e));
        return d;
    }

    function sp(n = 1) {
        const d = document.createElement('div');
        d.className = 'el spacer';
        if (n > 1) d.style.gridColumn = `span ${n}`;
        return d;
    }

    for (let p = 1; p <= 7; p++) for (let g = 1; g <= 18; g++) {
        if (p <= 2 && g >= 3 && g <= 12) {
            if (g === 3) grid.appendChild(sp(10));
            continue;
        }
        const e = byPG[p]?.[g];
        if (e && (e[4] === 'lanthanide' || e[4] === 'actinide') && e[2] !== 'Лантан' && e[2] !== 'Актиний') {
            grid.appendChild(sp());
            continue;
        }
        grid.appendChild(e ? cell(e) : sp());
    }
    const gr = document.createElement('div');
    gr.className = 'gap-row';
    grid.appendChild(gr);
    grid.appendChild(sp(2));
    const la = document.createElement('div');
    la.className = 'el lbl';
    la.textContent = '57–71';
    grid.appendChild(la);
    lant.forEach(e => grid.appendChild(cell(e)));
    grid.appendChild(sp());
    grid.appendChild(sp(2));
    const ac = document.createElement('div');
    ac.className = 'el lbl';
    ac.textContent = '89–103';
    grid.appendChild(ac);
    acti.forEach(e => grid.appendChild(cell(e)));
    grid.appendChild(sp());

    // hide arrow after scroll
    document.querySelector('.scroll-wrap').addEventListener('scroll', () => {
        document.getElementById('arrow').style.opacity = '0';
    }, { passive: true, once: true });

    // theme toggle
    const themeBtn = document.getElementById('theme-btn');
    const isLight = () => document.documentElement.classList.contains('light');

    function applyTheme(light) {
        document.documentElement.classList.toggle('light', light);
        themeBtn.textContent = light ? '☾' : '☀';
        localStorage.setItem('theme', light ? 'light' : 'dark');
    }

    themeBtn.addEventListener('click', () => applyTheme(!isLight()));
    // restore saved preference
    applyTheme(localStorage.getItem('theme') == 'light');

    // modal
    const ov = document.getElementById('overlay'), mo = document.getElementById('modal');

    function open(e) {
        const c = css(e[4]);
        mo.style.setProperty('--cat-color', c);
        document.getElementById('mnum').textContent = `# ${e[0]}`;
        document.getElementById('msym').textContent = e[1];
        document.getElementById('mname').textContent = e[2];
        document.getElementById('mcat').textContent = CAT[e[4]].label;
        document.getElementById('mmass').textContent = e[3] + ' а.е.м.';
        document.getElementById('mgp').textContent = `${e[6]} / ${e[5]}`;
        document.getElementById('myear').textContent = e[10] || 'Древность';
        document.getElementById('men').textContent = e[8] !== null ? e[8] : '—';
        document.getElementById('mstate').textContent = e[9];
        document.getElementById('mconf').textContent = 'e⁻: ' + e[7];
        ov.classList.add('open');
    }

    document.getElementById('mc').addEventListener('click', () => ov.classList.remove('open'));
    ov.addEventListener('click', e => {
        if (e.target === ov) ov.classList.remove('open');
    });
    let ty = 0;
    mo.addEventListener('touchstart', e => {
        ty = e.touches[0].clientY;
    }, { passive: true });
    mo.addEventListener('touchmove', e => {
        if (e.touches[0].clientY - ty > 80) ov.classList.remove('open');
    }, { passive: true });
