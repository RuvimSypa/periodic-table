<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Таблица Менделеева</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #08090e;
    --surface: #0f1117;
    --border: #1e2235;
    --text: #c8d0e8;
    --dim: #4a5272;
    --accent: #00e5ff;

    --alkali:      #ff5c6e;
    --alkaline:    #ff9f43;
    --transition:  #4e9dff;
    --post:        #a29bfe;
    --metalloid:   #55efc4;
    --nonmetal:    #fdcb6e;
    --halogen:     #fd79a8;
    --noble:       #74b9ff;
    --lanthanide:  #e17055;
    --actinide:    #6c5ce7;
    --unknown:     #636e72;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Exo 2', sans-serif;
    min-height: 100vh;
    overflow-x: auto;
    padding: 20px 10px 40px;
  }

  h1 {
    text-align: center;
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(16px, 3vw, 28px);
    letter-spacing: 6px;
    color: var(--accent);
    text-shadow: 0 0 20px rgba(0,229,255,.4);
    margin-bottom: 6px;
  }

  .subtitle {
    text-align: center;
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--dim);
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  /* ── LEGEND ─────────────────────────────── */
  .legend {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 6px 14px;
    margin-bottom: 18px;
    font-size: 10px;
    letter-spacing: 1px;
  }
  .legend-item { display: flex; align-items: center; gap: 5px; cursor: pointer; opacity: .8; transition: opacity .2s; }
  .legend-item:hover { opacity: 1; }
  .legend-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }

  /* ── GRID ────────────────────────────────── */
  .grid {
    display: grid;
    grid-template-columns: repeat(18, minmax(44px, 58px));
    grid-auto-rows: minmax(44px, 58px);
    gap: 3px;
    justify-content: center;
    margin: 0 auto;
    max-width: 1100px;
  }

  /* ── CELL ────────────────────────────────── */
  .el {
    position: relative;
    border-radius: 4px;
    border: 1px solid transparent;
    cursor: pointer;
    transition: transform .15s, box-shadow .15s, border-color .15s;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 2px;
    background: var(--surface);
    user-select: none;
  }
  .el:hover {
    transform: scale(1.18);
    z-index: 10;
    box-shadow: 0 0 18px 2px var(--cat-color);
    border-color: var(--cat-color);
  }
  .el .num  { font-size: 8px; color: var(--dim); font-family: 'Share Tech Mono', monospace; }
  .el .sym  { font-size: clamp(13px, 1.8vw, 18px); font-weight: 700; line-height: 1.1; }
  .el .name { font-size: 6px; text-align: center; color: var(--dim); line-height: 1.2; }
  .el .mass { font-size: 6px; color: var(--dim); font-family: 'Share Tech Mono', monospace; }

  /* Category colors applied via inline --cat-color + tinted bg */
  .el { background: color-mix(in srgb, var(--cat-color) 12%, var(--surface)); }
  .el .sym { color: var(--cat-color); text-shadow: 0 0 8px color-mix(in srgb, var(--cat-color) 60%, transparent); }

  /* spacer cells */
  .spacer { background: transparent; border: none; cursor: default; }
  .spacer:hover { transform: none; box-shadow: none; }

  /* label cells (period numbers, series labels) */
  .lbl {
    background: transparent; border: none; cursor: default;
    font-size: 9px; color: var(--dim); font-family: 'Share Tech Mono', monospace;
    display: flex; align-items: center; justify-content: center;
    letter-spacing: 1px;
  }
  .lbl:hover { transform: none; box-shadow: none; }

  /* lanthanide/actinide row gap */
  .gap-row { height: 8px; grid-column: 1 / -1; }

  /* series bracket */
  .series-bracket {
    grid-column: 3 / 4;
    display: flex; align-items: center; justify-content: flex-end;
    font-size: 8px; color: var(--dim); padding-right: 4px;
    font-family: 'Share Tech Mono', monospace;
  }

  /* ── MODAL ───────────────────────────────── */
  .overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,.7); backdrop-filter: blur(6px);
    z-index: 1000; align-items: center; justify-content: center;
  }
  .overlay.open { display: flex; }

  .modal {
    background: #0c0e18;
    border: 1px solid var(--cat-color, var(--accent));
    border-radius: 10px;
    padding: 28px 32px;
    max-width: 380px; width: 90%;
    box-shadow: 0 0 40px 4px color-mix(in srgb, var(--cat-color, var(--accent)) 35%, transparent);
    animation: pop .2s ease;
    position: relative;
  }
  @keyframes pop { from { transform: scale(.85); opacity: 0; } to { transform: scale(1); opacity: 1; } }

  .modal-close {
    position: absolute; top: 12px; right: 16px;
    background: none; border: none; color: var(--dim);
    font-size: 20px; cursor: pointer; line-height: 1;
  }
  .modal-close:hover { color: var(--text); }

  .modal-num  { font-size: 11px; color: var(--dim); font-family: 'Share Tech Mono', monospace; letter-spacing: 2px; }
  .modal-sym  { font-size: 72px; font-weight: 700; line-height: 1;
                color: var(--cat-color, var(--accent));
                text-shadow: 0 0 30px color-mix(in srgb, var(--cat-color, var(--accent)) 60%, transparent); }
  .modal-name { font-size: 22px; font-weight: 600; margin-bottom: 16px; }
  .modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 20px; font-size: 12px; }
  .modal-row  { display: flex; flex-direction: column; gap: 2px; }
  .modal-label { color: var(--dim); font-size: 10px; text-transform: uppercase; letter-spacing: 1px; }
  .modal-val  { color: var(--text); }
  .modal-cat  { display: inline-block; margin-top: 14px; font-size: 10px;
                padding: 3px 10px; border-radius: 20px; letter-spacing: 1px;
                background: color-mix(in srgb, var(--cat-color, var(--accent)) 20%, transparent);
                color: var(--cat-color, var(--accent));
                border: 1px solid color-mix(in srgb, var(--cat-color, var(--accent)) 40%, transparent); }
  .modal-config { font-family: 'Share Tech Mono', monospace; font-size: 11px; color: var(--dim); margin-top: 10px; word-break: break-all; }

  /* ── FILTER DIM ──────────────────────────── */
  .el.dimmed { opacity: .15; }
</style>
</head>

// resolve CSS var value
function catColor(cat) {
  const v = CAT[cat]?.var || '--unknown';
  return getComputedStyle(document.documentElement).getPropertyValue(v).trim();
}

// ─── BUILD LEGEND ──────────────────────────────────────────────────────────
const legend = document.getElementById('legend');
Object.entries(CAT).forEach(([key, {label, var: v}]) => {
  const color = getComputedStyle(document.documentElement).getPropertyValue(v).trim();
  const item = document.createElement('div');
  item.className = 'legend-item';
  item.dataset.cat = key;
  item.innerHTML = `<div class="legend-dot" style="background:${color}"></div>${label}`;
  item.addEventListener('click', () => filterCat(key));
  legend.appendChild(item);
});

// ─── BUILD GRID ────────────────────────────────────────────────────────────
// Map elements by [period][group]
const byPG = {};
ELEMENTS.forEach(el => {
  const [z, sym, name, mass, cat, period, group] = el;
  if (!byPG[period]) byPG[period] = {};
  byPG[period][group] = el;
});

// lanthanide/actinide separate rows
const lant = ELEMENTS.filter(e => e[4] === 'lanthanide' && e[2] !== 'Лантан');
const acti = ELEMENTS.filter(e => e[4] === 'actinide'   && e[2] !== 'Актиний');

const grid = document.getElementById('grid');

function makeCell(el) {
  const [z, sym, name, mass, cat, period, group, config, en, state, year] = el;
  const color = catColor(cat);
  const div = document.createElement('div');
  div.className = 'el';
  div.dataset.z = z; div.dataset.cat = cat;
  div.style.setProperty('--cat-color', color);
  div.innerHTML = `
    <span class="num">${z}</span>
    <span class="sym">${sym}</span>
    <span class="name">${name}</span>
    <span class="mass">${mass}</span>`;
  div.addEventListener('click', () => openModal(el));
  return div;
}

function spacer(cols = 1) {
  const d = document.createElement('div');
  d.className = 'el spacer';
  d.style.gridColumn = `span ${cols}`;
  return d;
}

// Period rows 1–7
for (let p = 1; p <= 7; p++) {
  for (let g = 1; g <= 18; g++) {
    // gaps in standard layout
    if (p <= 2 && g >= 3 && g <= 12) { if (g === 3) grid.appendChild(spacer(10)); continue; }
    const el = byPG[p]?.[g];
    // skip lanthanide/actinide in main grid (shown below)
    if (el && (el[4] === 'lanthanide' || el[4] === 'actinide') && el[2] !== 'Лантан' && el[2] !== 'Актиний') {
      grid.appendChild(spacer(1)); continue;
    }
    if (el) grid.appendChild(makeCell(el));
    else     grid.appendChild(spacer(1));
  }
}

// Gap row
const gap1 = document.createElement('div'); gap1.className = 'gap-row'; grid.appendChild(gap1);

// Lanthanide row: cols 1-2 spacer, cols 3-17 = 15 elements (La is in main grid)
grid.appendChild(spacer(2));
const lblLa = document.createElement('div');
lblLa.className = 'el lbl'; lblLa.textContent = '57–71'; grid.appendChild(lblLa);
lant.forEach(e => grid.appendChild(makeCell(e)));
grid.appendChild(spacer(1));

// Actinide row
grid.appendChild(spacer(2));
const lblAc = document.createElement('div');
lblAc.className = 'el lbl'; lblAc.textContent = '89–103'; grid.appendChild(lblAc);
acti.forEach(e => grid.appendChild(makeCell(e)));
grid.appendChild(spacer(1));

// ─── FILTER ────────────────────────────────────────────────────────────────
let activeFilter = null;
function filterCat(cat) {
  if (activeFilter === cat) {
    activeFilter = null;
    document.querySelectorAll('.el[data-z]').forEach(el => el.classList.remove('dimmed'));
  } else {
    activeFilter = cat;
    document.querySelectorAll('.el[data-z]').forEach(el => {
      el.classList.toggle('dimmed', el.dataset.cat !== cat);
    });
  }
}

// ─── MODAL ─────────────────────────────────────────────────────────────────
const overlay = document.getElementById('overlay');
const modal   = document.getElementById('modal');

function openModal(el) {
  const [z, sym, name, mass, cat, period, group, config, en, state, year] = el;
  const color = catColor(cat);
  modal.style.setProperty('--cat-color', color);
  document.getElementById('m-num').textContent  = `Элемент № ${z}`;
  document.getElementById('m-sym').textContent  = sym;
  document.getElementById('m-name').textContent = name;
  document.getElementById('m-mass').textContent = mass + ' а.е.м.';
  document.getElementById('m-group').textContent  = group;
  document.getElementById('m-period').textContent = period;
  document.getElementById('m-year').textContent   = year ? year : 'Древн.';
  document.getElementById('m-en').textContent    = en !== null ? en : '—';
  document.getElementById('m-state').textContent = state;
  document.getElementById('m-config').textContent = 'e⁻: ' + config;
  document.getElementById('m-cat').textContent  = CAT[cat]?.label || cat;
  overlay.classList.add('open');
}

document.getElementById('modal-close').addEventListener('click', () => overlay.classList.remove('open'));
overlay.addEventListener('click', e => { if (e.target === overlay) overlay.classList.remove('open'); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') overlay.classList.remove('open'); });
</script>
